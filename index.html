<!-- Letterhead Document Editor -->
<style>
  :root{
    --page-w: 8.403in;
    --page-h: 11.25in;
    --ink: #1c2b33;
    --paper-shadow: 0 1px 3px rgba(20,40,60,0.15), 0 8px 24px rgba(20,40,60,0.12);
    --toolbar-bg: #009fe3;
    --toolbar-bg-dark: #0c85bf;
    --toolbar-border: rgba(255,255,255,0.28);
    --toolbar-fg: #ffffff;
    --accent: #009fe3;
    --accent-dark: #0c85bf;
    --canvas-bg: #e7ebee;
  }
  *{ box-sizing: border-box; }
  .lh-app{
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--canvas-bg);
    min-height: 100%;
    padding: 0 0 80px 0;
    color: var(--ink);
  }
  /* ---------- Toolbar ---------- */
  .lh-toolbar{
    position: sticky;
    top: 0;
    z-index: 20;
    background: linear-gradient(180deg, var(--toolbar-bg) 0%, var(--toolbar-bg-dark) 100%);
    padding: 8px 18px;
    display: flex;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
    box-shadow: 0 2px 8px rgba(6,60,90,0.22);
  }
  .lh-toolbar .lh-group{
    display:flex;
    align-items:center;
    gap: 2px;
    padding: 0 9px;
    border-right: 1px solid var(--toolbar-border);
  }
  .lh-toolbar .lh-group:last-child{ border-right: none; }
  .lh-btn{
    border: 1px solid transparent;
    background: transparent;
    color: var(--toolbar-fg);
    width: 34px;
    height: 34px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.12s ease;
  }
  .lh-btn svg{ width: 18px; height: 18px; display: block; }
  .lh-btn:hover{ background: rgba(255,255,255,0.16); }
  .lh-btn.active{ background: rgba(255,255,255,0.32); border-color: rgba(255,255,255,0.4); }
  .lh-select{
    height: 34px;
    border: 1px solid transparent;
    border-radius: 6px;
    background: rgba(255,255,255,0.95);
    padding: 0 6px;
    font-size: 13px;
    color: var(--ink);
    cursor: pointer;
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
  }
  .lh-select:hover{ background: #fff; }
  #lhFontFamily{ width: 150px; }
  .lh-title-input{
    border: none;
    background: transparent;
    font-size: 15px;
    font-weight: 600;
    color: var(--toolbar-fg);
    padding: 4px 10px;
    width: 220px;
    border-radius: 6px;
  }
  .lh-title-input::placeholder{ color: rgba(255,255,255,0.75); }
  .lh-title-input:hover, .lh-title-input:focus{ background: rgba(255,255,255,0.16); outline: none; }
  .lh-spacer{ flex: 1; }
  .lh-primary-btn{
    background: #fff;
    color: var(--accent-dark);
    border: none;
    padding: 8px 16px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.12s ease, transform 0.12s ease;
  }
  .lh-primary-btn:hover{ background: #eaf7ff; }
  .lh-ghost-btn{
    background: transparent;
    color: var(--toolbar-fg);
    border: 1px solid rgba(255,255,255,0.55);
    padding: 8px 14px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.12s ease;
  }
  .lh-ghost-btn:hover{ background: rgba(255,255,255,0.16); }
  .lh-ghost-btn svg{ width: 15px; height: 15px; }

  /* ---------- Canvas / Pages ---------- */
  .lh-canvas{
    padding: 36px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 34px;
  }

  .lh-editable{
    position: absolute;
    top: 15%;
    left: 8.2%;
    right: 8.2%;
    bottom: 11%;
    outline: none;
    font-family: "Calibri", "Segoe UI", Arial, sans-serif;
    font-size: 12.5pt;
    line-height: 1.5;
    color: #24333c;
    overflow: hidden;
    cursor: text;
  }
  .lh-editable p{ margin: 0 0 10px 0; }
  .lh-editable:empty:before{
    content: attr(data-placeholder);
    color: #a7b4bc;
    pointer-events: none;
  }
  .lh-page-number{
    position: absolute;
    bottom: 3%;
    right: 8.2%;
    font-size: 9pt;
    color: #9aa7ae;
    font-family: "Calibri", Arial, sans-serif;
  }
  .lh-page-remove{
    position: absolute;
    top: -14px;
    right: -14px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #fff;
    border: 1px solid var(--toolbar-border);
    color: #c0392b;
    font-size: 15px;
    line-height: 1;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.12);
  }
  .lh-page-wrap{ position: relative; }
  .lh-page-wrap:hover .lh-page-remove{ display: flex; }

  /* ---------- Floating side action ---------- */
  .lh-fab{
    position: fixed;
    right: 26px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 30;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .lh-fab-btn{
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    border: none;
    box-shadow: 0 6px 18px rgba(13,132,200,0.4);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .lh-fab-btn:hover{ background: var(--accent-dark); transform: scale(1.06); }
  .lh-fab-label{
    font-size: 10.5px;
    font-weight: 600;
    color: #55636a;
    background: #fff;
    padding: 3px 9px;
    border-radius: 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .lh-status{
    position: fixed;
    left: 50%;
    bottom: 24px;
    transform: translateX(-50%);
    background: #1c2b33;
    color: #fff;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    z-index: 50;
  }
  .lh-status.show{ opacity: 1; }

  @media (max-width: 900px){
    :root{ --page-w: 94vw; --page-h: calc(94vw * 1.338); }
    .lh-fab{ right: 12px; }
    .lh-title-input{ width: 120px; }
  }

  /* ---------- Tables inside the editable area ---------- */
  .lh-editable table{
    border-collapse: collapse;
    width: 100%;
    margin: 6px 0 14px 0;
    table-layout: fixed;
  }
  .lh-editable table td, .lh-editable table th{
    border: 1px solid #9fb0b8;
    padding: 9px 10px;
    vertical-align: top;
    min-width: 24px;
    line-height: 1.5;
  }
  .lh-editable table td p, .lh-editable table th p{ margin: 0; }
  .lh-editable table th{
    background: #eef3f6;
    font-weight: 600;
  }

  /* ---------- Table insert picker (Google-Docs-style grid) ---------- */
  .lh-table-picker{
    position: absolute;
    top: 44px;
    left: 0;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 8px 28px rgba(20,40,60,0.22), 0 2px 6px rgba(20,40,60,0.12);
    padding: 12px;
    z-index: 40;
    display: none;
  }
  .lh-table-picker.open{ display: block; }
  .lh-table-grid{
    display: grid;
    grid-template-columns: repeat(8, 18px);
    grid-template-rows: repeat(8, 18px);
    gap: 3px;
  }
  .lh-table-cell{
    width: 18px;
    height: 18px;
    border: 1px solid #d7dee3;
    border-radius: 2px;
    background: #f7f9fa;
  }
  .lh-table-cell.hi{
    background: rgba(0,159,227,0.18);
    border-color: var(--accent);
  }
  .lh-table-picker-label{
    margin-top: 8px;
    font-size: 12.5px;
    color: var(--ink);
    text-align: center;
  }

  /* ---------- Print (used for PDF export) ---------- */
  @media print{
    @page{ size: 605.05pt 810.25pt; margin: 0; }
    html, body{ margin: 0; padding: 0; background: #fff !important; }
    .lh-toolbar, .lh-fab, .lh-status, .lh-page-remove{ display: none !important; }
    .lh-app{ background: #fff !important; padding: 0 !important; }
    .lh-canvas{ padding: 0 !important; gap: 0 !important; }
    .lh-page-wrap{ break-after: page; }
    .lh-page-wrap:last-child{ break-after: auto; }
    .lh-page{
      box-shadow: none !important;
      margin: 0 auto !important;
      width: 605.05pt !important;
      height: 810.25pt !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
  }

        <option value="Arial, sans-serif">Arial</option>
        <option value="Georgia, serif">Georgia</option>
        <option value="'Courier New', monospace">Courier New</option>
      </select>
    </div>
    <div class="lh-group">
      <button class="lh-btn" data-cmd="justifyLeft" title="Align left">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="3" y1="5" x2="17" y2="5"/><line x1="3" y1="10" x2="12" y2="10"/><line x1="3" y1="15" x2="15" y2="15"/></svg>
      </button>
      <button class="lh-btn" data-cmd="justifyCenter" title="Align center">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="3" y1="5" x2="17" y2="5"/><line x1="6" y1="10" x2="14" y2="10"/><line x1="4.5" y1="15" x2="15.5" y2="15"/></svg>
      </button>
      <button class="lh-btn" data-cmd="justifyRight" title="Align right">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="3" y1="5" x2="17" y2="5"/><line x1="8" y1="10" x2="17" y2="10"/><line x1="5" y1="15" x2="17" y2="15"/></svg>
      </button>
    </div>
    <div class="lh-group">
      <button class="lh-btn" data-cmd="insertUnorderedList" title="Bullet list">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="3.5" cy="5" r="1" fill="currentColor" stroke="none"/><circle cx="3.5" cy="10" r="1" fill="currentColor" stroke="none"/><circle cx="3.5" cy="15" r="1" fill="currentColor" stroke="none"/><line x1="7.5" y1="5" x2="17" y2="5"/><line x1="7.5" y1="10" x2="17" y2="10"/><line x1="7.5" y1="15" x2="17" y2="15"/></svg>
      </button>
      <button class="lh-btn" data-cmd="insertOrderedList" title="Numbered list">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><text x="1.5" y="6.5" font-size="5.5" fill="currentColor" stroke="none" font-family="Arial">1.</text><text x="1.5" y="11.5" font-size="5.5" fill="currentColor" stroke="none" font-family="Arial">2.</text><text x="1.5" y="16.5" font-size="5.5" fill="currentColor" stroke="none" font-family="Arial">3.</text><line x1="7.5" y1="5" x2="17" y2="5"/><line x1="7.5" y1="10" x2="17" y2="10"/><line x1="7.5" y1="15" x2="17" y2="15"/></svg>
      </button>
    </div>
    <div class="lh-group" style="position:relative;">
      <button class="lh-btn" id="lhInsertTable" title="Insert table">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2.5" y="3.5" width="15" height="13" rx="1.2"/><line x1="2.5" y1="8" x2="17.5" y2="8"/><line x1="2.5" y1="12.3" x2="17.5" y2="12.3"/><line x1="8" y1="3.5" x2="8" y2="16.5"/><line x1="13" y1="3.5" x2="13" y2="16.5"/></svg>
      </button>
      <div class="lh-table-picker" id="lhTablePicker">
        <div class="lh-table-grid" id="lhTableGrid"></div>
        <div class="lh-table-picker-label" id="lhTablePickerLabel">Insert table</div>
      </div>
    </div>
    <div class="lh-spacer"></div>
    <button class="lh-ghost-btn" id="lhAddPage">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="10" y1="4" x2="10" y2="16"/><line x1="4" y1="10" x2="16" y2="10"/></svg>
      Add page
    </button>
  </div>

  <div class="lh-canvas" id="lhCanvas"></div>

  <div class="lh-fab">
    <button class="lh-fab-btn" id="lhExportBtn" title="Export as PDF">&#8681;</button>
    <span class="lh-fab-label">Export PDF</span>
  </div>

  <div class="lh-status" id="lhStatus">Exported</div>
</div>

<script>
(function(){
  const PAGE_PT_W = 605.05;
  const PAGE_PT_H = 810.25;
  const canvasEl = document.getElementById('lhCanvas');
  const lhTablePicker = document.getElementById('lhTablePicker');
  const lhTableGrid = document.getElementById('lhTableGrid');
  const lhTablePickerLabel = document.getElementById('lhTablePickerLabel');
  const GRID_SIZE = 8;
  let pageCount = 0;

  // Build the hoverable grid cells for the table-insert picker
  for (let r = 1; r <= GRID_SIZE; r++){
    for (let c = 1; c <= GRID_SIZE; c++){
      const cell = document.createElement('div');
      cell.className = 'lh-table-cell';
      cell.dataset.row = r;
      cell.dataset.col = c;
      cell.addEventListener('mouseenter', function(){
        highlightGrid(r, c);
      });
      cell.addEventListener('click', function(e){
        e.stopPropagation();
        insertTable(r, c);
      });
      lhTableGrid.appendChild(cell);
    }
  }

  function highlightGrid(rows, cols){
    lhTableGrid.querySelectorAll('.lh-table-cell').forEach(function(cell){
      const r = parseInt(cell.dataset.row, 10);
      const c = parseInt(cell.dataset.col, 10);
      cell.classList.toggle('hi', r <= rows && c <= cols);
    });
    lhTablePickerLabel.textContent = rows + ' x ' + cols + ' table';
  }
  highlightGrid(0, 0);


  function makePage(){
    pageCount++;
    const wrap = document.createElement('div');
    wrap.className = 'lh-page-wrap';

    const page = document.createElement('div');
    page.className = 'lh-page';

    const editable = document.createElement('div');
    editable.className = 'lh-editable';
    editable.contentEditable = 'true';
    editable.setAttribute('data-placeholder', 'Start typing your letter here…');

    const pnum = document.createElement('div');
    pnum.className = 'lh-page-number';
    pnum.textContent = 'Page ' + pageCount;

    const removeBtn = document.createElement('button');
    removeBtn.className = 'lh-page-remove';
    removeBtn.innerHTML = '&times;';
    removeBtn.title = 'Remove page';
    removeBtn.addEventListener('click', function(){
      if (canvasEl.querySelectorAll('.lh-page-wrap').length <= 1) return;
      wrap.remove();
      renumber();
    });

    page.appendChild(editable);
    page.appendChild(pnum);
    wrap.appendChild(page);
    wrap.appendChild(removeBtn);
    canvasEl.appendChild(wrap);
    editable.focus();
    return wrap;
  }

  function renumber(){
    const wraps = canvasEl.querySelectorAll('.lh-page-wrap');
    wraps.forEach(function(w, i){
      const pnum = w.querySelector('.lh-page-number');
      if (pnum) pnum.textContent = 'Page ' + (i+1);
    });
    pageCount = wraps.length;
  }

  document.getElementById('lhAddPage').addEventListener('click', function(){
    makePage();
  });

  // Toolbar commands
  document.querySelectorAll('.lh-toolbar [data-cmd]').forEach(function(btn){
    btn.addEventListener('click', function(){
      document.execCommand(btn.getAttribute('data-cmd'), false, null);
      btn.classList.toggle('active');
    });
  });

  document.getElementById('lhFontSize').addEventListener('change', function(e){
    document.execCommand('fontSize', false, e.target.value);
  });
  document.getElementById('lhFontFamily').addEventListener('change', function(e){
    document.execCommand('fontName', false, e.target.value);
  });

  // ---- Insert table ----
  let lastFocusedEditable = null;
  document.addEventListener('focusin', function(e){
    if (e.target.classList && e.target.classList.contains('lh-editable')){
      lastFocusedEditable = e.target;
    }
  });

  document.getElementById('lhInsertTable').addEventListener('click', function(e){
    e.stopPropagation();
    lhTablePicker.classList.toggle('open');
  });

  document.getElementById('lhTablePicker').addEventListener('click', function(e){
    e.stopPropagation();
  });

  document.addEventListener('click', function(){
    lhTablePicker.classList.remove('open');
  });

  function insertTable(rows, cols){
    let html = '<table>';
    for (let r = 0; r < rows; r++){
      html += '<tr>';
      for (let c = 0; c < cols; c++){
        const cell = (r === 0) ? 'th' : 'td';
        html += '<' + cell + '><br></' + cell + '>';
      }
      html += '</tr>';
    }
    html += '</table><p><br></p>';

    const target = lastFocusedEditable || document.querySelector('.lh-editable');
    target.focus();
    document.execCommand('insertHTML', false, html);
    lhTablePicker.classList.remove('open');
  }

  function showStatus(msg){
    const el = document.getElementById('lhStatus');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(function(){ el.classList.remove('show'); }, 2200);
  }

  document.getElementById('lhExportBtn').addEventListener('click', function(){
    const title = document.getElementById('lhDocTitle').value.trim() || 'document';
    document.title = title;
    showStatus('Opening print dialog — choose "Save as PDF" and turn on "Background graphics"');
    setTimeout(function(){ window.print(); }, 400);
  });

  // init with one page
  makePage();
})();
</script>
